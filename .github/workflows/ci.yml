name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tree-sitter-cli globally
        run: npm install -g tree-sitter-cli@0.26.8

      - name: Setup tree-sitter config
        run: |
          tree-sitter init-config
          jq '."parser-directories" += ["'"$(dirname "$GITHUB_WORKSPACE")"'"]' \
            ~/.config/tree-sitter/config.json > /tmp/ts-config.json
          mv /tmp/ts-config.json ~/.config/tree-sitter/config.json

      - name: Run tests
        run: tree-sitter test
